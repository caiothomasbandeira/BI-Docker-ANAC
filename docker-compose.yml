services:
  postgres:
    image: postgres:16-alpine # <-- OTIMIZAÇÃO: Versão Alpine (muito mais leve)
    container_name: bi_postgres
    restart: unless-stopped # <-- OTIMIZAÇÃO: Reinicia sozinho se o PC reiniciar
    environment:
      POSTGRES_USER: bi_user
      POSTGRES_PASSWORD: bi_password
      POSTGRES_DB: bi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck: # <-- OTIMIZAÇÃO: Testa se o banco subiu antes de liberar outros serviços
      test: ["CMD-SHELL", "pg_isready -U bi_user -d bi_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: bi_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy # <-- OTIMIZAÇÃO: Só inicia após o banco estar 100% pronto

volumes:
  postgres_data:




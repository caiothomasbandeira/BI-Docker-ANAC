services:
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    image: bi_postgres:16
    container_name: bi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bi_user
      POSTGRES_PASSWORD: bi_password
      POSTGRES_DB: bi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/sql:ro
      - ./data:/data:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bi_user -d bi_db"]
      interval: 20s
      timeout: 20s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: bi_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - ./sql:/var/lib/pgadmin/storage/admin_example_com:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:



